<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>計程車記帳</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');
  :root { --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2e2e2e;--accent:#f5c518;--green:#4ade80;--red:#f87171;--text:#f0f0f0;--muted:#777; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;max-width:480px;margin:0 auto}
  header{background:var(--surface);border-bottom:2px solid var(--accent);padding:14px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
  header h1{font-size:17px;font-weight:900;letter-spacing:2px}
  header h1 span{color:var(--accent)}
  .date-badge{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);background:var(--surface2);padding:4px 10px;border-radius:20px}
  .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
  .tab{flex:1;padding:11px;text-align:center;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;letter-spacing:1px}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .page{display:none;padding:14px}
  .page.active{display:block}
  .section-title{font-size:10px;font-weight:700;letter-spacing:3px;color:var(--muted);margin:16px 0 8px;text-transform:uppercase}
  .input-row{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:10px}
  .input-row:focus-within{border-color:var(--accent)}
  .input-icon{font-size:18px;flex-shrink:0}
  .input-info{flex:1}
  .input-label{font-size:11px;color:var(--muted);margin-bottom:1px}
  .input-field{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:17px;font-family:'DM Mono',monospace;font-weight:500}
  .input-unit{font-size:11px;color:var(--muted);flex-shrink:0}
  .date-input{width:100%;background:transparent;border:none;outline:none;color:var(--accent);font-size:17px;font-family:'DM Mono',monospace;font-weight:500}
  .date-input::-webkit-calendar-picker-indicator{filter:invert(0.5)}
  .km-calc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:7px}
  .km-row{display:flex;gap:8px;margin-bottom:8px}
  .km-input-wrap{flex:1}
  .km-label{font-size:10px;color:var(--muted);margin-bottom:3px;letter-spacing:1px}
  .km-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:16px;font-family:'DM Mono',monospace;outline:none}
  .km-input:focus{border-color:var(--accent)}
  .km-result{display:flex;align-items:center;justify-content:space-between;padding-top:6px;border-top:1px solid var(--border)}
  .km-result-label{font-size:11px;color:var(--muted)}
  .km-result-val{font-family:'DM Mono',monospace;font-size:17px;color:var(--accent)}
  .summary-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:4px}
  .summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}
  .sum-item{background:var(--surface2);border-radius:8px;padding:10px}
  .sum-item.wide{grid-column:1/-1}
  .sum-label{font-size:10px;color:var(--muted);margin-bottom:3px;letter-spacing:1px}
  .sum-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:500}
  .sum-val.big{font-size:22px}
  .sum-val.green{color:var(--green)}
  .sum-val.red{color:var(--red)}
  .sum-val.yellow{color:var(--accent)}
  .btn-save{width:100%;background:var(--accent);color:#000;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:900;font-family:'Noto Sans TC',sans-serif;letter-spacing:3px;cursor:pointer;margin-top:16px;transition:all .15s}
  .btn-save:active{transform:scale(.97);opacity:.8}
  .btn-save:disabled{opacity:.5}
  .month-nav{display:flex;align-items:center;justify-content:space-between;margin:12px 0}
  .month-nav button{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 18px;border-radius:8px;cursor:pointer;font-size:18px}
  .month-nav span{font-family:'DM Mono',monospace;font-size:14px;color:var(--accent)}
  .table-wrap{overflow-x:auto;margin-top:8px}
  table{width:100%;border-collapse:collapse;font-size:12px;min-width:360px}
  th{background:var(--surface2);color:var(--muted);font-weight:700;letter-spacing:1px;padding:8px 6px;text-align:center;border-bottom:2px solid var(--accent);white-space:nowrap}
  td{padding:8px 6px;text-align:center;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace}
  tr:last-child td{border-bottom:none}
  .td-date{text-align:left;color:var(--muted);font-size:11px}
  .td-profit.pos{color:var(--accent);font-weight:700}
  .td-profit.neg{color:var(--red);font-weight:700}
  .month-summary{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:12px}
  .stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
  .stat-row:last-child{border-bottom:none}
  .stat-name{color:var(--muted)}
  .stat-val{font-family:'DM Mono',monospace;font-weight:500}
  .cfg-total-row{background:var(--surface2);border-radius:10px;padding:12px 14px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center}
  .empty{text-align:center;color:var(--muted);padding:40px 0;font-size:13px}
  .loading{text-align:center;color:var(--muted);padding:30px 0;font-size:13px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#000;padding:11px 22px;border-radius:24px;font-weight:700;font-size:13px;letter-spacing:1px;transition:transform .3s ease;z-index:999;white-space:nowrap}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.error{background:var(--red);color:#fff}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
</style>
</head>
<body>

<header>
  <h1>🚕 <span>計程車</span>記帳</h1>
  <div class="date-badge" id="todayBadge"></div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('record')">記帳</div>
  <div class="tab" onclick="switchTab('report')">月報表</div>
  <div class="tab" onclick="switchTab('settings')">設定</div>
</div>

<!-- 記帳 -->
<div class="page active" id="page-record">

  <div class="section-title">日期</div>
  <div class="input-row">
    <span class="input-icon">📅</span>
    <div class="input-info">
      <div class="input-label">日期（可補填前幾天）</div>
      <input class="date-input" type="date" id="recordDate">
    </div>
  </div>

  <div class="section-title">收入</div>
  <div class="input-row">
    <span class="input-icon">💰</span>
    <div class="input-info">
      <div class="input-label">實收金額（App 顯示金額）</div>
      <input class="input-field" type="number" id="income" placeholder="0" oninput="updateSummary()">
    </div>
    <span class="input-unit">元</span>
  </div>
  <div class="input-row">
    <span class="input-icon">🕐</span>
    <div class="input-info">
      <div class="input-label">上線小時</div>
      <input class="input-field" type="number" id="hours" placeholder="0" step="0.5" oninput="updateSummary()">
    </div>
    <span class="input-unit">小時</span>
  </div>

  <div class="section-title">公里數</div>
  <div class="km-calc">
    <div class="km-row">
      <div class="km-input-wrap">
        <div class="km-label">出發里程</div>
        <input class="km-input" type="number" id="kmStart" placeholder="0" oninput="updateKm()">
      </div>
      <div class="km-input-wrap">
        <div class="km-label">返家里程</div>
        <input class="km-input" type="number" id="kmEnd" placeholder="0" oninput="updateKm()">
      </div>
    </div>
    <div class="km-result">
      <span class="km-result-label">本次行駛</span>
      <span class="km-result-val" id="kmResult">0 km</span>
    </div>
  </div>

  <div class="section-title">支出</div>
  <div class="input-row">
    <span class="input-icon">⛽</span>
    <div class="input-info">
      <div class="input-label">加油 ＋ ETC ＋ 其他</div>
      <input class="input-field" type="number" id="fuel" placeholder="0" oninput="updateSummary()">
    </div>
    <span class="input-unit">元</span>
  </div>

  <div class="section-title">小結</div>
  <div class="summary-box">
    <div class="summary-grid">
      <div class="sum-item">
        <div class="sum-label">實收</div>
        <div class="sum-val yellow" id="s-income">$0</div>
      </div>
      <div class="sum-item">
        <div class="sum-label">固定攤提</div>
        <div class="sum-val red" id="s-fixed">$0</div>
      </div>
      <div class="sum-item">
        <div class="sum-label">本筆淨利</div>
        <div class="sum-val" id="s-profit">$0</div>
      </div>
      <div class="sum-item">
        <div class="sum-label">時薪</div>
        <div class="sum-val" id="s-hourly">$0</div>
      </div>
      <div class="sum-item wide" style="border:1px solid var(--accent)">
        <div class="sum-label">本月還差多少打平</div>
        <div class="sum-val big" id="s-gap">載入中...</div>
      </div>
    </div>
  </div>

  <button class="btn-save" id="saveBtn" onclick="saveRecord()">儲存這筆記錄</button>
</div>

<!-- 月報表 -->
<div class="page" id="page-report">
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span id="monthLabel"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <div id="reportContent"><div class="loading">載入中...</div></div>
</div>

<!-- 設定 -->
<div class="page" id="page-settings">
  <div class="section-title" style="margin-top:12px">每月固定開銷</div>
  <div class="input-row"><span class="input-icon">🚗</span><div class="input-info"><div class="input-label">車貸</div><input class="input-field" type="number" id="cfg-loan" placeholder="20000"></div><span class="input-unit">元/月</span></div>
  <div class="input-row"><span class="input-icon">🏢</span><div class="input-info"><div class="input-label">行費</div><input class="input-field" type="number" id="cfg-line" placeholder="4200"></div><span class="input-unit">元/月</span></div>
  <div class="input-row"><span class="input-icon">🛡️</span><div class="input-info"><div class="input-label">保險</div><input class="input-field" type="number" id="cfg-ins" placeholder="0"></div><span class="input-unit">元/月</span></div>
  <div class="input-row"><span class="input-icon">👷</span><div class="input-info"><div class="input-label">勞健保</div><input class="input-field" type="number" id="cfg-labor" placeholder="2730"></div><span class="input-unit">元/月</span></div>
  <div class="input-row"><span class="input-icon">🔧</span><div class="input-info"><div class="input-label">保養（月均）</div><input class="input-field" type="number" id="cfg-maintain" placeholder="10000"></div><span class="input-unit">元/月</span></div>
  <div class="input-row"><span class="input-icon">👨‍👩‍👧</span><div class="input-info"><div class="input-label">孝親費</div><input class="input-field" type="number" id="cfg-parent" placeholder="15000"></div><span class="input-unit">元/月</span></div>
  <div class="cfg-total-row">
    <span style="font-size:13px;color:var(--muted)">每月固定總計</span>
    <span class="sum-val yellow" id="cfg-total" style="font-size:20px">$0</span>
  </div>
  <div class="input-row"><span class="input-icon">📅</span><div class="input-info"><div class="input-label">預計每月出車天數</div><input class="input-field" type="number" id="cfg-days" placeholder="26"></div><span class="input-unit">天</span></div>
  <button class="btn-save" onclick="saveSettings()">儲存設定</button>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = '/api/records';
  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];

  let reportYear  = today.getFullYear();
  let reportMonth = today.getMonth();
  let monthCache  = { profit:0, loaded:false };

  document.getElementById('todayBadge').textContent = `${today.getMonth()+1}/${today.getDate()}`;
  document.getElementById('recordDate').value = todayStr;

  // 公里數
  function updateKm() {
    const s = +document.getElementById('kmStart').value || 0;
    const e = +document.getElementById('kmEnd').value   || 0;
    const d = e > s ? e - s : 0;
    document.getElementById('kmResult').textContent = d.toLocaleString() + ' km';
    updateSummary();
  }

  // 設定
  const DEF = { loan:20000, line:4200, ins:0, labor:2730, maintain:10000, parent:15000, days:26 };
  function getSettings() { return JSON.parse(localStorage.getItem('taxiSettings')||'null') || DEF; }
  function getMonthlyFixed() { const s=getSettings(); return s.loan+s.line+s.ins+s.labor+s.maintain+s.parent; }
  function getDailyFixed()   { const s=getSettings(); return Math.round(getMonthlyFixed()/s.days); }

  function loadSettings() {
    const s = getSettings();
    document.getElementById('cfg-loan').value    = s.loan;
    document.getElementById('cfg-line').value    = s.line;
    document.getElementById('cfg-ins').value     = s.ins;
    document.getElementById('cfg-labor').value   = s.labor;
    document.getElementById('cfg-maintain').value= s.maintain;
    document.getElementById('cfg-parent').value  = s.parent;
    document.getElementById('cfg-days').value    = s.days;
    updateCfgTotal();
  }

  function updateCfgTotal() {
    const ids = ['cfg-loan','cfg-line','cfg-ins','cfg-labor','cfg-maintain','cfg-parent'];
    const total = ids.reduce((s,id) => s + (+document.getElementById(id).value||0), 0);
    document.getElementById('cfg-total').textContent = '$' + total.toLocaleString();
  }
  ['cfg-loan','cfg-line','cfg-ins','cfg-labor','cfg-maintain','cfg-parent'].forEach(id => {
    document.getElementById(id).addEventListener('input', updateCfgTotal);
  });

  function saveSettings() {
    const s = {
      loan:    +document.getElementById('cfg-loan').value    ||0,
      line:    +document.getElementById('cfg-line').value    ||0,
      ins:     +document.getElementById('cfg-ins').value     ||0,
      labor:   +document.getElementById('cfg-labor').value   ||0,
      maintain:+document.getElementById('cfg-maintain').value||0,
      parent:  +document.getElementById('cfg-parent').value  ||0,
      days:    +document.getElementById('cfg-days').value    ||26,
    };
    localStorage.setItem('taxiSettings', JSON.stringify(s));
    showToast('✅ 設定已儲存');
  }

  // 小結
  function updateSummary() {
    const income = +document.getElementById('income').value || 0;
    const hours  = +document.getElementById('hours').value  || 0;
    const fuel   = +document.getElementById('fuel').value   || 0;
    const fixed  = getDailyFixed();
    const profit = income - fixed - fuel;
    const hourly = hours > 0 ? Math.round(profit/hours) : 0;

    document.getElementById('s-income').textContent = '$' + income.toLocaleString();
    document.getElementById('s-fixed').textContent  = '-$' + fixed.toLocaleString();
    const pEl = document.getElementById('s-profit');
    pEl.textContent = (profit>=0?'+':'') + '$' + profit.toLocaleString();
    pEl.className = 'sum-val ' + (profit>=0?'green':'red');
    document.getElementById('s-hourly').textContent = '$' + hourly.toLocaleString();
    updateGap();
  }

  // 本月差距
  async function loadMonthCache() {
    const ym = `${today.getFullYear()}年${String(today.getMonth()+1).padStart(2,'0')}月`;
    try {
      const res  = await fetch(`${API}?yearMonth=${encodeURIComponent(ym)}`);
      const data = await res.json();
      const rows = (data.rows||[]).slice(1).filter(r=>r[0]);
      const total = rows.reduce((s,r)=>s+(+(String(r[8]||'0').replace(/,/g,''))||0),0);
      monthCache = { profit:total, loaded:true };
    } catch { monthCache = { profit:0, loaded:false }; }
    updateGap();
  }

  function updateGap() {
    const el = document.getElementById('s-gap');
    if (!el) return;
    const rem = getMonthlyFixed() - monthCache.profit;
    if (rem <= 0) { el.textContent='✅ 已打平！'; el.className='sum-val big green'; }
    else          { el.textContent='-$'+rem.toLocaleString(); el.className='sum-val big red'; }
  }

  // 儲存
  async function saveRecord() {
    const income = +document.getElementById('income').value || 0;
    if (!income) { showToast('請輸入實收金額', true); return; }
    const dateVal = document.getElementById('recordDate').value;
    if (!dateVal) { showToast('請選擇日期', true); return; }

    const s     = +document.getElementById('kmStart').value || 0;
    const e     = +document.getElementById('kmEnd').value   || 0;
    const km    = e > s ? e - s : 0;
    const fixed = getDailyFixed();

    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = '儲存中...';

    try {
      const res  = await fetch(API, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ date:dateVal, fixed, fuel:+document.getElementById('fuel').value||0, km, hours:+document.getElementById('hours').value||0, income })
      });
      const data = await res.json();
      if (data.success) {
        showToast('✅ 已寫入試算表！');
        ['income','hours','fuel','kmStart','kmEnd'].forEach(id => document.getElementById(id).value='');
        document.getElementById('kmResult').textContent = '0 km';
        document.getElementById('recordDate').value = todayStr;
        monthCache.profit += data.profit || 0;
        updateSummary();
      } else { showToast('❌ '+data.error, true); }
    } catch { showToast('❌ 網路錯誤', true); }

    btn.disabled = false; btn.textContent = '儲存這筆記錄';
  }

  // Tab
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active',['record','report','settings'][i]===tab));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-'+tab).classList.add('active');
    if (tab==='report')   loadReport();
    if (tab==='settings') loadSettings();
  }

  function changeMonth(dir) {
    reportMonth += dir;
    if (reportMonth>11){reportMonth=0;reportYear++;}
    if (reportMonth<0) {reportMonth=11;reportYear--;}
    loadReport();
  }

  async function loadReport() {
    const ym = `${reportYear}年${String(reportMonth+1).padStart(2,'0')}月`;
    document.getElementById('monthLabel').textContent = ym;
    document.getElementById('reportContent').innerHTML = '<div class="loading">載入中...</div>';
    try {
      const res  = await fetch(`${API}?yearMonth=${encodeURIComponent(ym)}`);
      const data = await res.json();
      renderReport(data.rows||[]);
    } catch { document.getElementById('reportContent').innerHTML='<div class="empty">載入失敗</div>'; }
  }

  function pn(v) { return +(String(v||'0').replace(/,/g,''))||0; }

  function renderReport(rows) {
    if (rows.length<=1) { document.getElementById('reportContent').innerHTML='<div class="empty">本月尚無記錄</div>'; return; }

    // 按日期合併
    const dayMap = {};
    rows.slice(1).forEach(r => {
      if (!r[0]) return;
      const date = r[0];
      if (!dayMap[date]) dayMap[date]={income:0,fixed:0,fuel:0,km:0,hours:0,profit:0};
      dayMap[date].income += pn(r[6]);
      dayMap[date].fixed  += pn(r[1]);
      dayMap[date].fuel   += pn(r[2]);
      dayMap[date].km     += pn(r[3]);
      dayMap[date].hours  += pn(r[4]);
      dayMap[date].profit += pn(r[8]);
    });

    let tIncome=0,tFixed=0,tFuel=0,tKm=0,tHours=0,tProfit=0;

    let html = `<div class="table-wrap"><table><tr>
      <th>日期</th><th>實收</th><th>固定</th><th>油費</th><th>時數</th>
      <th style="color:var(--accent)">淨利</th></tr>`;

    Object.entries(dayMap).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([date,d])=>{
      tIncome+=d.income;tFixed+=d.fixed;tFuel+=d.fuel;tKm+=d.km;tHours+=d.hours;tProfit+=d.profit;
      const cls=d.profit>=0?'pos':'neg';
      html+=`<tr>
        <td class="td-date">${date}</td>
        <td style="color:var(--accent)">${d.income.toLocaleString()}</td>
        <td style="color:var(--red)">${d.fixed.toLocaleString()}</td>
        <td style="color:var(--red)">${d.fuel.toLocaleString()}</td>
        <td>${d.hours}</td>
        <td class="td-profit ${cls}">${d.profit>=0?'+':''}${d.profit.toLocaleString()}</td>
      </tr>`;
    });
    html += '</table></div>';

    const days = Object.keys(dayMap).length;
    const avgH = tHours>0 ? Math.round(tProfit/tHours) : 0;

    html += `<div class="month-summary">
      <div class="stat-row"><span class="stat-name">總實收</span><span class="stat-val" style="color:var(--accent)">$${tIncome.toLocaleString()}</span></div>
      <div class="stat-row"><span class="stat-name">固定開銷攤提</span><span class="stat-val" style="color:var(--red)">-$${tFixed.toLocaleString()}</span></div>
      <div class="stat-row"><span class="stat-name">油費/ETC/其他</span><span class="stat-val" style="color:var(--red)">-$${tFuel.toLocaleString()}</span></div>
      <div class="stat-row" style="border-top:2px solid var(--accent);margin-top:4px;padding-top:12px">
        <span class="stat-name" style="color:var(--text);font-weight:700">本月淨利</span>
        <span class="stat-val" style="font-size:20px;color:${tProfit>=0?'var(--accent)':'var(--red)'}">
          ${tProfit>=0?'+':''}$${tProfit.toLocaleString()}</span>
      </div>
      <div class="stat-row"><span class="stat-name">出車天數</span><span class="stat-val">${days} 天</span></div>
      <div class="stat-row"><span class="stat-name">平均時薪</span><span class="stat-val">$${avgH.toLocaleString()}</span></div>
      <div class="stat-row"><span class="stat-name">總里程</span><span class="stat-val">${tKm.toLocaleString()} km</span></div>
      <div class="stat-row"><span class="stat-name">總上線時數</span><span class="stat-val">${tHours} 小時</span></div>
    </div>`;

    document.getElementById('reportContent').innerHTML = html;
  }

  function showToast(msg,isError=false) {
    const t=document.getElementById('toast');
    t.textContent=msg; t.className='toast'+(isError?' error':'');
    t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
  }

  loadSettings(); updateSummary(); loadMonthCache();
</script>
</body>
</html>
